name: hive

services:
  database:
    container_name: database
    image: postgres:15-alpine
    env_file:
      - ../../.env
    volumes:
      - database-data:/var/lib/postgresql/data
    networks:
      intranet:
        aliases:
          - database
          - postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.5"
          memory: 256M


  vault:
    image: hashicorp/vault:1.17
    container_name: vault
    cap_add:
      - IPC_LOCK
    command: ["server"]
    environment:
      VAULT_LOCAL_CONFIG: '{"storage":{"file":{"path":"/vault/file"}},"listener":[{"tcp":{"address":"0.0.0.0:8200","tls_disable":"1"}}],"disable_mlock":true,"ui":false}'
    volumes:
      - vault-data:/vault/file
    networks:
      intranet:
        aliases:
          - vault
    healthcheck:
      # Returns 200 for initialized+unsealed, sealed, or uninitialized — vault-init handles the rest
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health?standbyok=true&uninitcode=200&sealedcode=200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  vault-init:
    image: alpine:3.19
    container_name: vault-init-prod
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      DATABASE_URL: "${DATABASE_URL}"
      JWT_SECRET: "${JWT_SECRET}"
      REFRESH_SECRET: "${REFRESH_SECRET}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      FRONTEND_URL: "${FRONTEND_URL}"
      METRICS_SECRET: "${METRICS_SECRET}"
    volumes:
      - vault-keys:/vault/keys
      - ../../scripts:/app/scripts:ro
    networks:
      intranet:
    command: sh /app/scripts/vault-prod-init.sh
    restart: "no"

  backend:
    container_name: backend
    build:
      context: ../../
      dockerfile: devops/containers/backend.Dockerfile
    env_file:
      - ../../.env
    networks:
      intranet:
        aliases:
          - backend
          - api-gateway
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - shared:/app/uploads:rw
      - vault-keys:/vault/keys:ro
    depends_on:
      database:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  webserver:
    container_name: webserver
    build:
      context: ../../
      dockerfile: devops/containers/waf.Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - shared:/app/uploads:rw
      - ../../certs:/etc/nginx/ssl:ro
    networks:
      intranet:
        aliases:
          - webserver
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      grafana:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "wget", "-qO-", "-U", "NginxHealthCheck", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 128M
      restart_policy:
        condition: on-failure

  frontend:
    container_name: frontend
    build:
      context: ../../
      dockerfile: devops/containers/frontend.Dockerfile
    env_file:
      - ../../.env
    networks:
      intranet:
        aliases:
          - frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_started
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.4.1
    env_file:
      - ../../.env
    volumes:
      - ../../devops/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.tmpl:ro
      - ../../devops/monitoring/prometheus/entrypoint.sh:/entrypoint.sh:ro
      - prometheus-data:/prometheus
    entrypoint: ["/entrypoint.sh"]
    command:
      - '--config.file=/tmp/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      intranet:
        aliases:
          - prometheus
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
      restart_policy:
        condition: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    container_name: grafana
    image: grafana/grafana:12.1.0
    volumes:
      - grafana-data:/var/lib/grafana
      - ../../devops/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: '%(protocol)s://%(domain)s/grafana/'
      GF_SERVER_SERVE_FROM_SUB_PATH: 'true'
      GF_NEWS_NEWS_FEED_ENABLED: 'false'
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    networks:
      intranet:
        aliases:
          - grafana
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: on-failure

  postgres-exporter:
    container_name: postgres-exporter
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?sslmode=disable"
    networks:
      intranet:
        aliases:
          - postgres-exporter
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9187/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      database:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 64M
      restart_policy:
        condition: on-failure

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    networks:
      intranet:
        aliases:
          - node-exporter
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9100/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 64M
      restart_policy:
        condition: on-failure

  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    privileged: true
    cap_add:
      - SYS_PTRACE
    devices:
      - /dev/kmsg
    command:
      # - '--disable_metrics=disk'
      - '--stderrthreshold=FATAL'
      - '--containerd=/run/containerd/containerd.sock'
      - '--containerd-namespace=moby'
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/lib/docker/:/rootfs/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      intranet:
        aliases:
          - cadvisor
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
      restart_policy:
        condition: on-failure

  nginx-exporter:
    container_name: nginx-exporter
    build:
      context: ../../
      dockerfile: devops/containers/nginx-exporter.Dockerfile
    command:
      - '--nginx.scrape-uri=http://webserver:80/nginx_status'
    networks:
      intranet:
        aliases:
          - nginx-exporter
    healthcheck:
      test: ["CMD", "/bin/wget", "-qO", "/dev/null", "http://localhost:9113/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      webserver:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 32M
      restart_policy:
        condition: on-failure


volumes:
  database-data:
    name: hive-database-data
    labels:
      project: hive
  vault-data:
    name: hive-vault-data
    labels:
      project: hive
  vault-keys:
    name: hive-vault-keys
    labels:
      project: hive
  shared:
    name: hive-shared
    driver: local
    labels:
      project: hive
  prometheus-data:
    name: hive-prometheus-data
    labels:
      project: hive
  grafana-data:
    name: hive-grafana-data
    labels:
      project: hive


networks:
  intranet:
    name: hive-intranet
    driver: bridge
    attachable: true
    driver_opts:
      com.docker.network.driver.mtu: 1450
    labels:
      project: hive
