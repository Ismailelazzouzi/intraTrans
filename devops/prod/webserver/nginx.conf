worker_processes auto;

worker_rlimit_nofile 65535; # Optimization for high load
pid /var/run/nginx/nginx.pid;
# Load ModSecurity module - provided by the owasp/modsecurity-crs image
load_module modules/ngx_http_modsecurity_module.so;

events {
    worker_connections 2048; # Increased for efficiency
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    # Security: Hide Nginx version
    server_tokens off;

    # Performance: Basic optimizations
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Performance: File Cache
    open_file_cache          max=1000 inactive=20s;
    open_file_cache_valid    30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # Security/Efficiency: Client limits
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    client_max_body_size 10m;
    large_client_header_buffers 4 8k;

    # Security: Slowloris DoS mitigation
    client_body_timeout   10s;
    client_header_timeout 10s;

    # Efficiency: Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Security: Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

    # Hosting: Real-IP Configuration (Uncomment if behind a proxy like Cloudflare/ALB)
    # set_real_ip_from  10.0.0.0/8;
    # set_real_ip_from  172.16.0.0/12;
    # set_real_ip_from  192.168.0.0/16;
    # real_ip_header    X-Forwarded-For;
    # real_ip_recursive on;
    # Logging: Efficient buffered logging

    access_log /var/log/nginx/access.log combined buffer=32k flush=1m;
    error_log /var/log/nginx/error.log warn;

    # Security Snippets
    include /etc/nginx/snippets/security-headers.conf;
    include /etc/nginx/snippets/modsecurity.conf;

    include /etc/nginx/conf.d/*.conf;
}


