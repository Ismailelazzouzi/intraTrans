SecRuleEngine On
SecRequestBodyAccess On
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 524288
SecResponseBodyAccess Off
SecAuditEngine RelevantOnly
SecAuditLog /var/log/nginx/modsec_audit.log
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecRule REQUEST_HEADERS:User-Agent "@pmFromFile /etc/nginx/modsecurity/bad-user-agents.txt" "id:1001,phase:1,deny,status:403,log,msg:'Blocked scanner/bot user-agent'"
Include /opt/owasp-crs/crs-setup.conf

# Method Whitelist: Allow PUT, PATCH, DELETE for Grafana/API
SecAction \
 "id:900200,\
  phase:1,\
  nolog,\
  pass,\
  t:none,\
  setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE'"

Include /opt/owasp-crs/rules/*.conf

# Fix for Google OAuth callback: 'scope' contains '.profile' which triggers false positive LFI
SecRuleUpdateTargetById 930120 "!ARGS:scope"
