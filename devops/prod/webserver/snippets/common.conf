# Security: Deny access to sensitive files
location ~* \.(php|env|git|log|sql|bak|yml|yaml|config|md)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# Security: Deny all hidden files (dotfiles) except .well-known
location ~ /\.(?!well-known) {
    deny all;
    access_log off;
    log_not_found off;
}
