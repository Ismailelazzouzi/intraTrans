# 1. Define where the traffic actually goes (Docker container names)
upstream frontend_app {
    server frontend:8080;
}

upstream backend_service {
    server backend:3000;
}

upstream grafana_service {
    server grafana:3000;
}

# 2. Define the public-facing server
server {
    listen 80;
    server_name localhost;

    location /healthz {
        modsecurity off;
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 3. HTTPS server with WAF + routing
server {
    listen 443 ssl;
    server_name localhost;

    # TLS configuration
    include /etc/nginx/snippets/ssl.conf;
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    include /etc/nginx/snippets/common.conf;

    # ----------------------------------------------------
    # HEALTHCHECK: Local reply, bypass ModSecurity
    # ----------------------------------------------------
    location /healthz {
        modsecurity off;
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ----------------------------------------------------
    # AUTHENTICATION API
    # ----------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend_service/api/;

        # Pass client info to the backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable redirect breaking for Google OAuth
        proxy_redirect off;
    }

    # ----------------------------------------------------
    # WEBSOCKETS
    # ----------------------------------------------------
    location /socket.io/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend_service/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ----------------------------------------------------
    # FRONTEND UI & WEBSOCKETS (HMR)
    # ----------------------------------------------------
    location / {
        proxy_pass http://frontend_app/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Crucial for Vite's Hot Module Replacement
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    # ----------------------------------------------------
    # GRAFANA
    # ----------------------------------------------------
    location /grafana/ {

        # No rate limiting — Grafana makes many concurrent API calls per dashboard load
        # and is already protected by its own authentication layer.

        proxy_pass http://grafana_service/grafana/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Grafana Live features
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Suppress upstream headers that Grafana already sets to avoid duplicates
        # (nginx add_header appends; without hide, browsers receive two conflicting values)
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;

        # Override global security headers for Grafana
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy no-referrer always;
        add_header X-Permitted-Cross-Domain-Policies none always;

        # SECURITY NOTE: 'unsafe-inline' and 'unsafe-eval' are required by Grafana's
        # panel rendering engine and plugin system to function correctly.
        # This is a documented limitation of self-hosted Grafana (not a misconfiguration).
        # This weaker CSP is scoped ONLY to /grafana/ — the rest of the application
        # uses a strict CSP without these directives.
        # Mitigation: Grafana access requires authentication (GF_USERS_ALLOW_SIGN_UP=false)
        # and is restricted to admin users only.
        #
        # worker-src: Grafana 12.x spawns Web Workers from blob: URLs (bundler output).
        # connect-src blob: covers fetch() calls to blob: URLs from those workers.
        # font-src data: covers base64-encoded fonts embedded by some Grafana plugins.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss: blob:; worker-src 'self' blob:; frame-ancestors 'none';" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }
    # ─── Nginx Status Endpoint (Internal Only) ──────────────────────
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;
    }

    # ─── Block /metrics from external access ────────────────────────
    location /metrics {
        deny all;
        return 404;
    }
}
